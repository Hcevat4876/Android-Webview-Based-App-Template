name: DABI Core Clean Build

on:
  push:
    branches: [ "master", "main" ] # Kodunu her güncellediğinde çalışır
  workflow_dispatch: # Elle tetiklemek için buton açar

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build APK and AAB (Clean Production)
      run: ./gradlew assembleRelease bundleRelease

    - name: Upload Clean APK
      uses: actions/upload-artifact@v4
      with:
        name: dabi-saf-apk
        path: app/build/outputs/apk/release/*.apk

    - name: Upload Clean AAB (Google Play format)
      uses: actions/upload-artifact@v4
      with:
        name: dabi-saf-aab
        path: app/build/outputs/bundle/release/*.aab
